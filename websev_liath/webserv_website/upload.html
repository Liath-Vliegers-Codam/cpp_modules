<html>
	<head>
		<link rel="stylesheet" href="styles.css">
		<title>WebServ upload page</title>
	</head>
	<body>

		<h1>UPLOAD PAGE</h1>

		<h2>
			Upload your file here:
		</h2>


		<form action="/upload_dir" method="POST" enctype="multipart/form-data" class="upload-form">
			<div class="file-upload-container">
				<input type="file" id="file-input" name="file" accept="*/*" onchange="showFileName()">
				<label for="file-input" class="file-upload-label">
					Choose File to Upload
				</label>
				<div id="file-info" class="file-info" style="display: none;">
					<span id="file-name"></span>
					<button type="submit" class="submit-btn">Upload</button>
				</div>
			</div>
		</form>


		<div  class="button-go-back-container">
			<a href="index.html">
				<button id="index_page">Go Back</button>
			</a>
		</div>
			
		<footer>
			<p class="date-and-time"><span id="date-and-time"> date and time </span></p>

			<script src="script.js"></script>
		</footer>

	</body>
</html>
